name: Inactive Issue Checker

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  check-inactive-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run inactive-issue-checker
        env:
          ORG_NAME: ${{ secrets.ORG_NAME }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: uv run scripts/inactive-issues/check_inactive_issues.py