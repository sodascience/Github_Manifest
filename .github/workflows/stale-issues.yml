name: Stale Issue Reminder

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  check-stale-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run stale issue checker
        env:
          ORG_NAME: ${{ secrets.ORG_NAME }}
          GITHUB_TOKEN: ${{ secrets.READING_TOKEN }}
        run: uv run scripts/stale-issues/check_stale_issues.py